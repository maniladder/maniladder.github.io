<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ManiLadder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="hero-copy">
        <h1>
          <span class="wordmark">ManiLadder</span>
          <span class="hero-tagline">Benchmarking Robot Manipulation Through a Categorized and Multi-Level Task Ladder</span>
        </h1>
      </div>
    </div>
  </header>

  <main>
    <section class="intro-section" id="overview" aria-label="Overview">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Overview</p>
        </div>
      </div>
      <div class="intro-video-shell">
        <video class="intro-video" controls preload="metadata" poster="" aria-label="ManiLadder introduction video">
          <source src="videos/video_corl26.mp4" type="video/mp4">
        </video>
        <div class="intro-placeholder">
          <span>ManiLadder overview video</span>
        </div>
      </div>
    </section>

    <section class="controls-section" id="task-gallery" aria-label="Gallery controls">
      <label class="search-box">
        <span>Search</span>
        <input id="search-input" type="search" placeholder="Task name, domain, embodiment">
      </label>
      <div class="segmented" id="level-filter" aria-label="Level filter"></div>
      <div class="segmented compact" id="domain-filter" aria-label="Domain filter"></div>
    </section>

    <section class="gallery-section" aria-live="polite">
      <div id="gallery"></div>
    </section>
  </main>

  <script src="data/tasks.js"></script>
  <script src="data/video-status.js"></script>
  <script src="app.js"></script>
</body>
</html>
